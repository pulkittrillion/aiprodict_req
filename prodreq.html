<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Product Requirement Generator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 750px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h1 { margin-top: 0; font-size: 24px; color: #1e40af; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea { height: 120px; resize: vertical; }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        #outputContainer { margin-top: 30px; display: none; }
        #output {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            border-left: 4px solid #2563eb;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.6;
        }
        .loading {
            display: none;
            text-align: center;
            font-weight: 600;
            color: #2563eb;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Product Requirement Document Generator</h1>
    <form id="prdForm">
        <div class="form-group">
            <label for="prodName">Product Name</label>
            <input type="text" id="prodName" placeholder="e.g., Smart Fitness Tracker App" required>
        </div>
        <div class="form-group">
            <label for="prodDesc">Core Features & Description</label>
            <textarea id="prodDesc" placeholder="Describe what the product does, target audience, and primary features..." required></textarea>
        </div>
        <button type="submit" id="submitBtn">Generate PRD Document</button>
    </form>

    <div class="loading" id="loadingState">Processing with DeepSeek AI via n8n... Please wait.</div>

    <div id="outputContainer">
        <h2>Generated Product Requirement Document</h2>
        <div id="output"></div>
    </div>
</div>

<script>
    const N8N_WEBHOOK_URL = 'https://feed-gis-interfaces-memory.trycloudflare.com/webhook-test/prd-generator';

    document.getElementById('prdForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const prodName = document.getElementById('prodName').value;
        const prodDesc = document.getElementById('prodDesc').value;
        
        const submitBtn = document.getElementById('submitBtn');
        const loadingState = document.getElementById('loadingState');
        const outputContainer = document.getElementById('outputContainer');
        const output = document.getElementById('output');

        // Toggle visibility states
        submitBtn.disabled = true;
        loadingState.style.display = 'block';
        outputContainer.style.display = 'none';

        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    productName: prodName, 
                    productDescription: prodDesc 
                })
            });

            if (!response.ok) {
                throw new Error('Failed to get a valid response from n8n webhook.');
            }

            // FIX: Read the response directly as text since n8n is sending text, not JSON
            let prdText = await response.text();
            
            // Clean up the stray '=' symbol if n8n includes it in the text stream
            if (prdText.startsWith('=')) {
                prdText = prdText.substring(1);
            }
            
            // Display the text on your screen
            output.textContent = prdText;
            outputContainer.style.display = 'block';
        } catch (error) {
            alert('Error connecting to pipeline. Ensure your n8n workflow is running and active.');
            console.error(error);
        } finally {
            submitBtn.disabled = false;
            loadingState.style.display = 'none';
        }
    });
</script>
</body>
</html>
